<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino Growth Tracker 🦖</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a1a; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    var ce = React.createElement;
    var useState = React.useState;
    var useEffect = React.useEffect;
    var useRef = React.useRef;
    var Fragment = React.Fragment;

    var DINOS = [
      { name: "Tyrannosaurus", emoji: "🦖" },
      { name: "Carnotaurus", emoji: "🦕" },
      { name: "Omniraptor", emoji: "🦖" },
      { name: "Deinosuchus", emoji: "🐊" },
      { name: "Stegosaurus", emoji: "🦕" },
      { name: "Ceratosaurus", emoji: "🦖" },
      { name: "Allosaurus", emoji: "🦖" },
      { name: "Dilophosaurus", emoji: "🦕" },
      { name: "Herrerasaurus", emoji: "🦖" },
      { name: "Pteranodon", emoji: "🦅" },
      { name: "Troodon", emoji: "🦖" },
      { name: "Diabloceratops", emoji: "🦕" },
      { name: "Dryosaurus", emoji: "🦕" },
      { name: "Hypsilophodon", emoji: "🦖" },
      { name: "Maiasaura", emoji: "🦕" },
      { name: "Pachycephalosaurus", emoji: "🦖" },
      { name: "Tenontoaurus", emoji: "🦕" },
      { name: "Triceratops", emoji: "🦏" },
      { name: "Beipiaosaurus", emoji: "🦖" },
      { name: "Gallimimus", emoji: "🐦" },
    ];

    function formatTime(secs) {
      var h = Math.floor(secs / 3600);
      var m = Math.floor((secs % 3600) / 60);
      var s = secs % 60;
      return String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
    }

    var initialEntries = [
      { species: "Triceratops", emoji: "🦏", percent: 12.5, time: "00:04:33", id: 1 },
      { species: "Tyrannosaurus", emoji: "🦖", percent: 8.2, time: "00:02:10", id: 2 },
      { species: "Pteranodon", emoji: "🦅", percent: 20.0, time: "00:07:55", id: 3 },
    ];

    function DinoTracker() {
      var _sel = useState(null), selectedDino = _sel[0], setSelectedDino = _sel[1];
      var _gp = useState(""), growthPercent = _gp[0], setGrowthPercent = _gp[1];
      var _el = useState(0), elapsed = _el[0], setElapsed = _el[1];
      var _ru = useState(false), running = _ru[0], setRunning = _ru[1];
      var _pa = useState(false), paused = _pa[0], setPaused = _pa[1];
      var _en = useState(initialEntries), entries = _en[0], setEntries = _en[1];
      var _to = useState(null), toast = _to[0], setToast = _to[1];
      var _dd = useState(false), dropdownOpen = _dd[0], setDropdownOpen = _dd[1];
      var _at = useState("tracker"), activeTab = _at[0], setActiveTab = _at[1];
      var intervalRef = useRef(null);
      var pausedElapsedRef = useRef(0);
      var startTimeRef = useRef(0);
      var nextId = useRef(4);

      useEffect(function() {
        if (running) {
          startTimeRef.current = Date.now() - pausedElapsedRef.current * 1000;
          intervalRef.current = setInterval(function() {
            setElapsed(Math.floor((Date.now() - startTimeRef.current) / 1000));
          }, 500);
        } else {
          clearInterval(intervalRef.current);
        }
        return function() { clearInterval(intervalRef.current); };
      }, [running]);

      function handleStart() {
        if (!running && !paused) { pausedElapsedRef.current = 0; setElapsed(0); setRunning(true); setPaused(false); }
      }
      function handlePause() {
        if (running) { pausedElapsedRef.current = elapsed; setRunning(false); setPaused(true); }
      }
      function handleResume() {
        if (paused) { setRunning(true); setPaused(false); }
      }
      function handleStop() {
        setRunning(false); setPaused(false); pausedElapsedRef.current = 0; setElapsed(0);
      }
      function showToast(msg, type) {
        setToast({ msg: msg, type: type });
        setTimeout(function() { setToast(null); }, 3000);
      }
      function handleSave() {
        if (!selectedDino) { showToast("⚠️ Bitte eine Spezies auswählen!", "warn"); return; }
        var val = parseFloat(growthPercent.replace(",", "."));
        if (isNaN(val)) { showToast("⚠️ Bitte eine gültige Prozentzahl eingeben!", "warn"); return; }
        var newEntry = { id: nextId.current++, species: selectedDino.name, emoji: selectedDino.emoji, percent: Math.round(val * 10) / 10, time: formatTime(elapsed) };
        setEntries(function(prev) { return [newEntry].concat(prev); });
        showToast("✅ " + selectedDino.name + " mit " + val.toFixed(1) + "% gespeichert!", "success");
        setGrowthPercent("");
      }

      var topGrower = entries.length ? entries.reduce(function(a, b) { return a.percent > b.percent ? a : b; }) : null;

      // --- Tracker tab content ---
      var trackerContent = ce(Fragment, null,
        // Species dropdown
        ce("div", { style: { marginBottom: "20px", position: "relative" } },
          ce("label", { style: { display: "block", color: "rgba(255,255,255,0.6)", fontSize: "0.78rem", marginBottom: "6px", letterSpacing: "1px", textTransform: "uppercase" } }, "Spezies"),
          ce("button", {
            onClick: function() { setDropdownOpen(!dropdownOpen); },
            style: { width: "100%", padding: "12px 16px", borderRadius: "12px", border: "1px solid rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.07)", color: "#fff", fontSize: "0.95rem", cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", justifyContent: "space-between", fontFamily: "inherit" }
          },
            ce("span", null, selectedDino ? selectedDino.emoji + " " + selectedDino.name : "— Dinosaurier wählen —"),
            ce("span", { style: { opacity: 0.5 } }, dropdownOpen ? "▲" : "▼")
          ),
          dropdownOpen ? ce("div", { style: { position: "absolute", top: "100%", left: 0, right: 0, background: "#1a2535", border: "1px solid rgba(255,255,255,0.12)", borderRadius: "12px", zIndex: 100, maxHeight: "220px", overflowY: "auto", marginTop: "4px", boxShadow: "0 12px 40px rgba(0,0,0,0.5)" } },
            DINOS.map(function(d) {
              return ce("div", {
                key: d.name,
                onClick: function() { setSelectedDino(d); setDropdownOpen(false); },
                onMouseEnter: function(ev) { ev.target.style.background = "rgba(255,255,255,0.07)"; },
                onMouseLeave: function(ev) { ev.target.style.background = selectedDino && selectedDino.name === d.name ? "rgba(255,107,0,0.2)" : "transparent"; },
                style: { padding: "10px 16px", cursor: "pointer", color: "#fff", fontSize: "0.9rem", background: selectedDino && selectedDino.name === d.name ? "rgba(255,107,0,0.2)" : "transparent", transition: "background 0.15s" }
              }, d.emoji + " " + d.name);
            })
          ) : null
        ),
        // Growth input
        ce("div", { style: { marginBottom: "24px" } },
          ce("label", { style: { display: "block", color: "rgba(255,255,255,0.6)", fontSize: "0.78rem", marginBottom: "6px", letterSpacing: "1px", textTransform: "uppercase" } }, "Wachstumsrate (%)"),
          ce("input", { type: "text", value: growthPercent, onChange: function(ev) { setGrowthPercent(ev.target.value); }, placeholder: "z.B. 12.5", style: { width: "100%", padding: "12px 16px", borderRadius: "12px", border: "1px solid rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.07)", color: "#fff", fontSize: "0.95rem", outline: "none", boxSizing: "border-box", fontFamily: "inherit" } })
        ),
        // Timer
        ce("div", { style: { textAlign: "center", marginBottom: "20px", background: "rgba(0,0,0,0.3)", borderRadius: "16px", padding: "20px", border: "1px solid rgba(255,107,0,0.2)" } },
          ce("div", { style: { color: "rgba(255,255,255,0.4)", fontSize: "0.72rem", letterSpacing: "2px", marginBottom: "6px" } }, "TIMER"),
          ce("div", { style: { fontSize: "2.8rem", fontWeight: "bold", letterSpacing: "4px", color: running ? "#ff6b00" : paused ? "#ffaa00" : "rgba(255,255,255,0.7)", fontFamily: "'Courier New', monospace", textShadow: running ? "0 0 20px rgba(255,107,0,0.5)" : "none", transition: "color 0.3s" } }, formatTime(elapsed)),
          ce("div", { style: { fontSize: "0.72rem", marginTop: "6px", color: running ? "#4caf9a" : paused ? "#ffaa00" : "rgba(255,255,255,0.25)" } }, running ? "● LÄUFT" : paused ? "⏸ PAUSIERT" : "○ GESTOPPT")
        ),
        // Timer buttons
        ce("div", { style: { display: "flex", gap: "8px", marginBottom: "16px" } },
          [
            { label: "▶ Start", fn: handleStart, active: !running && !paused, color: "#22c55e" },
            { label: "⏸ Pause", fn: handlePause, active: running, color: "#f59e0b" },
            { label: "⏵ Weiter", fn: handleResume, active: paused, color: "#3b82f6" },
            { label: "⏹ Stop", fn: handleStop, active: running || paused, color: "#ef4444" },
          ].map(function(b) {
            return ce("button", { key: b.label, onClick: b.fn, style: { flex: 1, padding: "10px 0", borderRadius: "10px", border: "none", cursor: b.active ? "pointer" : "default", background: b.active ? b.color : "rgba(255,255,255,0.06)", color: b.active ? "#fff" : "rgba(255,255,255,0.25)", fontSize: "0.72rem", fontWeight: "bold", fontFamily: "inherit", transition: "all 0.2s", opacity: b.active ? 1 : 0.5 } }, b.label);
          })
        ),
        // Save
        ce("button", {
          onClick: handleSave,
          onMouseEnter: function(ev) { ev.target.style.transform = "translateY(-2px)"; ev.target.style.boxShadow = "0 8px 28px rgba(255,107,0,0.5)"; },
          onMouseLeave: function(ev) { ev.target.style.transform = "none"; ev.target.style.boxShadow = "0 4px 20px rgba(255,107,0,0.4)"; },
          style: { width: "100%", padding: "14px", borderRadius: "14px", border: "none", cursor: "pointer", background: "linear-gradient(135deg, #ff6b00, #ff9a00)", color: "#fff", fontSize: "1rem", fontWeight: "bold", fontFamily: "inherit", letterSpacing: "0.5px", boxShadow: "0 4px 20px rgba(255,107,0,0.4)", transition: "transform 0.15s, box-shadow 0.15s" }
        }, "💾 Eintrag speichern")
      );

      // --- Records tab content ---
      var recordsContent = ce(Fragment, null,
        topGrower ? ce("div", { style: { background: "rgba(255,107,0,0.12)", border: "1px solid rgba(255,107,0,0.25)", borderRadius: "12px", padding: "12px 16px", marginBottom: "16px", display: "flex", alignItems: "center", gap: "10px" } },
          ce("span", { style: { fontSize: "1.4rem" } }, "🏆"),
          ce("div", null,
            ce("div", { style: { color: "rgba(255,255,255,0.5)", fontSize: "0.7rem", letterSpacing: "1px" } }, "SCHNELLSTER WACHSTUM"),
            ce("div", { style: { color: "#fff", fontWeight: "bold" } }, topGrower.emoji + " " + topGrower.species + " — " + topGrower.percent.toFixed(1) + "%")
          )
        ) : null,
        ce("div", { style: { display: "flex", flexDirection: "column", gap: "10px" } },
          entries.length === 0
            ? ce("div", { style: { textAlign: "center", color: "rgba(255,255,255,0.25)", padding: "30px 0" } }, "Noch keine Einträge. Starte den Tracker! 🦕")
            : entries.map(function(entry) {
                return ce("div", { key: entry.id, style: { background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "14px", padding: "14px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" } },
                  ce("div", { style: { display: "flex", alignItems: "center", gap: "12px" } },
                    ce("span", { style: { fontSize: "1.8rem" } }, entry.emoji),
                    ce("div", null,
                      ce("div", { style: { color: "#fff", fontWeight: "bold", fontSize: "0.95rem" } }, entry.species),
                      ce("div", { style: { color: "rgba(255,255,255,0.35)", fontSize: "0.75rem" } }, "⏱ " + entry.time)
                    )
                  ),
                  ce("div", { style: { background: "linear-gradient(135deg, rgba(255,107,0,0.25), rgba(255,154,0,0.15))", border: "1px solid rgba(255,107,0,0.3)", borderRadius: "8px", padding: "6px 12px", color: "#ff9a00", fontWeight: "bold", fontSize: "1rem" } }, entry.percent.toFixed(1) + "%")
                );
              })
        )
      );

      // --- Main layout ---
      return ce("div", { style: { minHeight: "100vh", background: "linear-gradient(135deg, #0a0a1a 0%, #0d1b2a 50%, #0a1628 100%)", fontFamily: "'Georgia', serif", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-start", padding: "0 0 40px 0", position: "relative", overflow: "hidden" } },
        // Background blobs
        ce("div", { style: { position: "fixed", top: "-100px", right: "-100px", width: "400px", height: "400px", borderRadius: "50%", background: "radial-gradient(circle, rgba(255,107,0,0.12), transparent 70%)", pointerEvents: "none" } }),
        ce("div", { style: { position: "fixed", bottom: "-100px", left: "-80px", width: "350px", height: "350px", borderRadius: "50%", background: "radial-gradient(circle, rgba(0,200,120,0.1), transparent 70%)", pointerEvents: "none" } }),
        // Header
        ce("div", { style: { width: "100%", maxWidth: "560px", textAlign: "center", padding: "36px 20px 8px" } },
          ce("div", { style: { fontSize: "52px", lineHeight: 1, marginBottom: "6px" } }, "🦖"),
          ce("h1", { style: { margin: 0, fontSize: "2rem", fontWeight: "bold", color: "#fff", letterSpacing: "1px", textShadow: "0 0 30px rgba(255,140,0,0.4)" } }, "Dino Growth Tracker"),
          ce("p", { style: { color: "rgba(255,255,255,0.45)", fontSize: "0.82rem", marginTop: "4px" } }, "Wachstumsraten für Deine Dinosaurier 🌿")
        ),
        // Tabs
        ce("div", { style: { display: "flex", gap: "8px", margin: "18px 0 0", background: "rgba(255,255,255,0.05)", borderRadius: "50px", padding: "4px" } },
          ["tracker", "records"].map(function(tab) {
            return ce("button", { key: tab, onClick: function() { setActiveTab(tab); }, style: { padding: "8px 26px", borderRadius: "50px", border: "none", fontFamily: "inherit", fontSize: "0.88rem", cursor: "pointer", fontWeight: activeTab === tab ? "bold" : "normal", background: activeTab === tab ? "linear-gradient(135deg, #ff6b00, #ff9a00)" : "transparent", color: activeTab === tab ? "#fff" : "rgba(255,255,255,0.5)", transition: "all 0.2s" } }, tab === "tracker" ? "🔬 Tracker" : "📋 Einträge");
          })
        ),
        // Card
        ce("div", { style: { width: "100%", maxWidth: "520px", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: "24px", padding: "28px 24px", margin: "20px 16px 0", backdropFilter: "blur(10px)" } },
          activeTab === "tracker" ? trackerContent : recordsContent
        ),
        // Toast
        toast ? ce("div", { style: { position: "fixed", bottom: "24px", left: "50%", transform: "translateX(-50%)", background: toast.type === "success" ? "rgba(34,197,94,0.95)" : "rgba(245,158,11,0.95)", color: "#fff", padding: "12px 24px", borderRadius: "50px", fontSize: "0.9rem", fontWeight: "bold", boxShadow: "0 8px 30px rgba(0,0,0,0.4)", animation: "fadeIn 0.3s ease", zIndex: 1000 } }, toast.msg) : null
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(ce(DinoTracker));
  </script>
</body>
</html>
