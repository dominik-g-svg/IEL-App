<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IEL Tools – In einem Land vor unserer Zeit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    :root {
      --bg-deep: #060d13;
      --bg-mid: #0b1820;
      --bg-card: rgba(255,255,255,0.035);
      --border: rgba(255,255,255,0.08);
      --accent: #e87a1e;
      --accent-glow: rgba(232,122,30,0.4);
      --accent2: #2ec486;
      --text: #fff;
      --text-dim: rgba(255,255,255,0.45);
      --text-muted: rgba(255,255,255,0.25);
      --font-display: 'Cinzel', serif;
      --font-body: 'Lora', serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes pulse { 0%,100% { opacity:0.6; } 50% { opacity:1; } }
    @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(12px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    input[type="color"] {
      -webkit-appearance: none;
      border: none;
      cursor: pointer;
      background: transparent;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: 2px solid rgba(255,255,255,0.15); border-radius: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    var ce = React.createElement;
    var useState = React.useState;
    var useEffect = React.useEffect;
    var useRef = React.useRef;
    var useCallback = React.useCallback;
    var F = React.Fragment;

    /* =========================================
       SHARED DATA
    ========================================= */
    var DINOS = [
      { name:"Tyrannosaurus", emoji:"🦖", type:"carnivore" },
      { name:"Carnotaurus", emoji:"🦕", type:"carnivore" },
      { name:"Omniraptor", emoji:"🦖", type:"carnivore" },
      { name:"Deinosuchus", emoji:"🐊", type:"carnivore" },
      { name:"Stegosaurus", emoji:"🦕", type:"herbivore" },
      { name:"Ceratosaurus", emoji:"🦖", type:"carnivore" },
      { name:"Allosaurus", emoji:"🦖", type:"carnivore" },
      { name:"Dilophosaurus", emoji:"🦕", type:"carnivore" },
      { name:"Herrerasaurus", emoji:"🦖", type:"carnivore" },
      { name:"Pteranodon", emoji:"🦅", type:"carnivore" },
      { name:"Troodon", emoji:"🦖", type:"carnivore" },
      { name:"Diabloceratops", emoji:"🦕", type:"herbivore" },
      { name:"Dryosaurus", emoji:"🦕", type:"herbivore" },
      { name:"Hypsilophodon", emoji:"🦖", type:"herbivore" },
      { name:"Maiasaura", emoji:"🦕", type:"herbivore" },
      { name:"Pachycephalosaurus", emoji:"🦖", type:"herbivore" },
      { name:"Tenontosaurus", emoji:"🦕", type:"herbivore" },
      { name:"Triceratops", emoji:"🦏", type:"herbivore" },
      { name:"Beipiaosaurus", emoji:"🦖", type:"herbivore" },
      { name:"Gallimimus", emoji:"🐦", type:"herbivore" },
    ];

    /* =========================================
       SKIN CREATOR DINO SVGs
    ========================================= */
    function DinoSVG(props) {
      var c = props.colors;
      // Generic theropod silhouette
      if (props.bodyType === "theropod") {
        return ce("svg", { viewBox:"0 0 400 260", style:{ width:"100%", maxWidth:"380px" } },
          // body
          ce("ellipse", { cx:180, cy:140, rx:80, ry:50, fill:c.primary, stroke:c.markings, strokeWidth:1.5 }),
          // belly
          ce("ellipse", { cx:180, cy:165, rx:55, ry:25, fill:c.belly }),
          // tail
          ce("path", { d:"M260 140 Q310 120 370 150 Q340 140 260 145Z", fill:c.primary, stroke:c.markings, strokeWidth:1 }),
          // neck
          ce("path", { d:"M115 125 Q90 90 80 65 Q85 55 95 60 Q100 80 120 115Z", fill:c.primary }),
          // head
          ce("ellipse", { cx:78, cy:55, rx:30, ry:18, fill:c.secondary }),
          // jaw
          ce("path", { d:"M50 58 Q65 72 95 65 Q80 70 50 62Z", fill:c.secondary }),
          // eye
          ce("circle", { cx:70, cy:50, r:4, fill:"#fff" }),
          ce("circle", { cx:71, cy:50, r:2.5, fill:"#1a1a1a" }),
          // teeth
          ce("path", { d:"M52 58 L55 63 L58 58 L61 63 L64 58", fill:"none", stroke:"#fff", strokeWidth:1 }),
          // legs
          ce("path", { d:"M155 185 L145 230 L155 228 L160 190Z", fill:c.secondary }),
          ce("path", { d:"M200 185 L195 230 L205 228 L205 190Z", fill:c.secondary }),
          // arms
          ce("path", { d:"M130 135 L115 155 L120 157 L135 140Z", fill:c.secondary }),
          // dorsal markings
          ce("path", { d:"M120 100 Q150 85 180 90 Q210 85 240 100", fill:"none", stroke:c.markings, strokeWidth:2.5, strokeDasharray:"8,6" }),
          // pattern spots
          ce("circle", { cx:160, cy:125, r:6, fill:c.markings, opacity:0.5 }),
          ce("circle", { cx:200, cy:130, r:5, fill:c.markings, opacity:0.4 }),
          ce("circle", { cx:230, cy:135, r:4, fill:c.markings, opacity:0.3 }),
          // feet claws
          ce("path", { d:"M143 228 L138 240 M148 228 L146 240 M153 228 L154 238", fill:"none", stroke:c.markings, strokeWidth:1.5 }),
          ce("path", { d:"M193 228 L188 240 M198 228 L196 240 M203 228 L204 238", fill:"none", stroke:c.markings, strokeWidth:1.5 })
        );
      }
      // Quadruped (ceratopsian/stegosaur type)
      if (props.bodyType === "quadruped") {
        return ce("svg", { viewBox:"0 0 400 260", style:{ width:"100%", maxWidth:"380px" } },
          // body
          ce("ellipse", { cx:200, cy:130, rx:100, ry:55, fill:c.primary, stroke:c.markings, strokeWidth:1.5 }),
          // belly
          ce("ellipse", { cx:200, cy:160, rx:70, ry:28, fill:c.belly }),
          // tail
          ce("path", { d:"M298 125 Q340 110 380 130 Q350 125 300 135Z", fill:c.primary }),
          // neck
          ce("path", { d:"M108 110 Q80 85 65 75 Q60 68 70 65 Q78 72 110 100Z", fill:c.primary }),
          // head
          ce("ellipse", { cx:58, cy:68, rx:28, ry:20, fill:c.secondary }),
          // frill/horn
          ce("path", { d:"M40 55 Q30 35 45 30 Q55 28 65 40 Q72 48 68 55", fill:c.markings, opacity:0.7 }),
          ce("path", { d:"M45 48 L38 32", fill:"none", stroke:c.belly, strokeWidth:2 }),
          // eye
          ce("circle", { cx:52, cy:63, r:4, fill:"#fff" }),
          ce("circle", { cx:53, cy:63, r:2.5, fill:"#1a1a1a" }),
          // front legs
          ce("path", { d:"M140 178 L132 232 L142 230 L148 182Z", fill:c.secondary }),
          ce("path", { d:"M160 178 L155 232 L165 230 L165 182Z", fill:c.secondary }),
          // back legs
          ce("path", { d:"M240 178 L235 232 L245 230 L248 182Z", fill:c.secondary }),
          ce("path", { d:"M265 178 L262 232 L272 230 L270 182Z", fill:c.secondary }),
          // back plates/spines
          ce("path", { d:"M150 82 L158 60 L166 80", fill:c.markings, opacity:0.6 }),
          ce("path", { d:"M178 75 L188 50 L198 73", fill:c.markings, opacity:0.7 }),
          ce("path", { d:"M210 75 L220 52 L230 75", fill:c.markings, opacity:0.6 }),
          ce("path", { d:"M240 80 L248 62 L256 82", fill:c.markings, opacity:0.5 }),
          // pattern
          ce("circle", { cx:170, cy:120, r:7, fill:c.markings, opacity:0.35 }),
          ce("circle", { cx:210, cy:115, r:8, fill:c.markings, opacity:0.3 }),
          ce("circle", { cx:250, cy:125, r:6, fill:c.markings, opacity:0.25 })
        );
      }
      // Flyer
      return ce("svg", { viewBox:"0 0 400 260", style:{ width:"100%", maxWidth:"380px" } },
        // body
        ce("ellipse", { cx:200, cy:130, rx:40, ry:30, fill:c.primary }),
        // belly
        ce("ellipse", { cx:200, cy:145, rx:28, ry:15, fill:c.belly }),
        // left wing
        ce("path", { d:"M165 120 Q100 70 30 90 Q80 100 120 115 Q90 125 40 140 Q100 130 160 130Z", fill:c.secondary, stroke:c.markings, strokeWidth:1 }),
        // right wing
        ce("path", { d:"M235 120 Q300 70 370 90 Q320 100 280 115 Q310 125 360 140 Q300 130 240 130Z", fill:c.secondary, stroke:c.markings, strokeWidth:1 }),
        // neck
        ce("path", { d:"M180 108 Q170 80 165 60", fill:"none", stroke:c.primary, strokeWidth:12, strokeLinecap:"round" }),
        // head
        ce("ellipse", { cx:162, cy:52, rx:18, ry:12, fill:c.secondary }),
        // crest
        ce("path", { d:"M155 45 Q145 25 158 20 Q165 22 162 42", fill:c.markings, opacity:0.7 }),
        // beak
        ce("path", { d:"M145 52 L125 58 L145 56Z", fill:c.markings }),
        // eye
        ce("circle", { cx:158, cy:48, r:3, fill:"#fff" }),
        ce("circle", { cx:159, cy:48, r:1.8, fill:"#1a1a1a" }),
        // legs
        ce("path", { d:"M190 158 L185 200 M195 200 L185 200 L178 200", fill:"none", stroke:c.secondary, strokeWidth:3 }),
        ce("path", { d:"M210 158 L215 200 M220 200 L215 200 L208 200", fill:"none", stroke:c.secondary, strokeWidth:3 }),
        // wing membrane lines
        ce("path", { d:"M160 122 Q120 105 60 110", fill:"none", stroke:c.markings, strokeWidth:0.8, opacity:0.4 }),
        ce("path", { d:"M240 122 Q280 105 340 110", fill:"none", stroke:c.markings, strokeWidth:0.8, opacity:0.4 })
      );
    }

    function getBodyType(name) {
      var flyers = ["Pteranodon"];
      var quads = ["Stegosaurus","Diabloceratops","Triceratops","Tenontosaurus","Maiasaura"];
      if (flyers.indexOf(name) !== -1) return "flyer";
      if (quads.indexOf(name) !== -1) return "quadruped";
      return "theropod";
    }

    /* =========================================
       SKIN CREATOR COMPONENT
    ========================================= */
    function SkinCreator() {
      var _sel = useState(DINOS[0]), selDino = _sel[0], setSelDino = _sel[1];
      var _dd = useState(false), ddOpen = _dd[0], setDdOpen = _dd[1];
      var _colors = useState({ primary:"#4a7a3b", secondary:"#3d6630", belly:"#c8b87a", markings:"#2a4a22" }), colors = _colors[0], setColors = _colors[1];
      var _saved = useState([]), saved = _saved[0], setSaved = _saved[1];
      var _toast = useState(null), toast = _toast[0], setToast = _toast[1];
      var _skinName = useState(""), skinName = _skinName[0], setSkinName = _skinName[1];

      function showToast(msg, type) {
        setToast({ msg:msg, type:type });
        setTimeout(function() { setToast(null); }, 3000);
      }

      function updateColor(key, val) {
        var next = {}; for (var k in colors) next[k] = colors[k];
        next[key] = val;
        setColors(next);
      }

      function handleSave() {
        var name = skinName.trim() || selDino.name + " Skin #" + (saved.length + 1);
        var entry = { id: Date.now(), dino: selDino.name, emoji: selDino.emoji, name: name, colors: { primary: colors.primary, secondary: colors.secondary, belly: colors.belly, markings: colors.markings } };
        setSaved(function(prev) { return [entry].concat(prev); });
        showToast("✅ " + name + " gespeichert!", "success");
        setSkinName("");
      }

      function loadSkin(entry) {
        var d = DINOS.find(function(x) { return x.name === entry.dino; });
        if (d) setSelDino(d);
        setColors({ primary: entry.colors.primary, secondary: entry.colors.secondary, belly: entry.colors.belly, markings: entry.colors.markings });
        showToast("🎨 " + entry.name + " geladen!", "success");
      }

      function randomize() {
        function rh() { return "#" + Math.floor(Math.random()*16777215).toString(16).padStart(6,"0"); }
        setColors({ primary: rh(), secondary: rh(), belly: rh(), markings: rh() });
      }

      var presets = [
        { name:"🌲 Wald", colors:{ primary:"#3b5e2f", secondary:"#2d4a24", belly:"#c4b176", markings:"#1f3318" } },
        { name:"🏜️ Wüste", colors:{ primary:"#c4a35a", secondary:"#a8873c", belly:"#e8dbb5", markings:"#8b6914" } },
        { name:"❄️ Arktis", colors:{ primary:"#b8c8d8", secondary:"#8fa8be", belly:"#e8eef3", markings:"#5c7a94" } },
        { name:"🌋 Vulkan", colors:{ primary:"#4a1a1a", secondary:"#7a2020", belly:"#c44a1a", markings:"#ff6820" } },
        { name:"🌙 Nacht", colors:{ primary:"#1a1a2e", secondary:"#16213e", belly:"#2a2a4a", markings:"#0f3460" } },
        { name:"☠️ Albino", colors:{ primary:"#f0e8e0", secondary:"#e8ddd0", belly:"#fff8f0", markings:"#d4c4b0" } },
        { name:"🦎 Giftig", colors:{ primary:"#1a472a", secondary:"#0d2818", belly:"#aaff44", markings:"#ff2266" } },
        { name:"🌊 Ozean", colors:{ primary:"#1a5276", secondary:"#154360", belly:"#85c1e9", markings:"#0e3d5c" } },
      ];

      var colorFields = [
        { key:"primary", label:"Primärfarbe", desc:"Hauptkörper" },
        { key:"secondary", label:"Sekundärfarbe", desc:"Kopf, Beine" },
        { key:"belly", label:"Bauchfarbe", desc:"Unterseite" },
        { key:"markings", label:"Muster", desc:"Streifen, Flecken" },
      ];

      // --- Render ---
      return ce("div", { style:{ animation:"fadeUp 0.5s ease" } },
        // Dino selector
        ce("div", { style:{ marginBottom:"24px", position:"relative" } },
          ce("label", { style:{ display:"block", color:"var(--text-dim)", fontSize:"0.75rem", marginBottom:"6px", letterSpacing:"1.5px", textTransform:"uppercase", fontFamily:"var(--font-display)" } }, "Dinosaurier"),
          ce("button", {
            onClick: function() { setDdOpen(!ddOpen); },
            style:{ width:"100%", padding:"12px 16px", borderRadius:"12px", border:"1px solid var(--border)", background:"rgba(255,255,255,0.06)", color:"var(--text)", fontSize:"0.95rem", cursor:"pointer", textAlign:"left", display:"flex", alignItems:"center", justifyContent:"space-between", fontFamily:"var(--font-body)" }
          },
            ce("span", null, selDino.emoji + " " + selDino.name),
            ce("span", { style:{ opacity:0.4, fontSize:"0.8rem" } }, ddOpen ? "▲" : "▼")
          ),
          ddOpen ? ce("div", { style:{ position:"absolute", top:"100%", left:0, right:0, background:"#121e2a", border:"1px solid var(--border)", borderRadius:"12px", zIndex:100, maxHeight:"220px", overflowY:"auto", marginTop:"4px", boxShadow:"0 16px 48px rgba(0,0,0,0.6)" } },
            DINOS.map(function(d) {
              return ce("div", {
                key:d.name,
                onClick:function() { setSelDino(d); setDdOpen(false); },
                onMouseEnter:function(ev) { ev.target.style.background="rgba(255,255,255,0.07)"; },
                onMouseLeave:function(ev) { ev.target.style.background = selDino.name===d.name ? "rgba(232,122,30,0.15)" : "transparent"; },
                style:{ padding:"10px 16px", cursor:"pointer", color:"#fff", fontSize:"0.88rem", background: selDino.name===d.name ? "rgba(232,122,30,0.15)":"transparent", transition:"background 0.15s", display:"flex", justifyContent:"space-between", alignItems:"center" }
              },
                ce("span", null, d.emoji + " " + d.name),
                ce("span", { style:{ fontSize:"0.68rem", color:"var(--text-muted)", textTransform:"uppercase", letterSpacing:"1px" } }, d.type === "carnivore" ? "🥩" : "🌿")
              );
            })
          ) : null
        ),

        // SVG Preview
        ce("div", { style:{ background:"rgba(0,0,0,0.35)", borderRadius:"18px", padding:"24px", marginBottom:"24px", border:"1px solid var(--border)", textAlign:"center", position:"relative", overflow:"hidden" } },
          ce("div", { style:{ position:"absolute", top:0, left:0, right:0, bottom:0, background:"radial-gradient(ellipse at 50% 80%, rgba(46,196,134,0.06), transparent 70%)", pointerEvents:"none" } }),
          ce("div", { style:{ fontSize:"0.68rem", color:"var(--text-muted)", letterSpacing:"2px", marginBottom:"12px", fontFamily:"var(--font-display)" } }, "VORSCHAU"),
          ce(DinoSVG, { colors:colors, bodyType:getBodyType(selDino.name) }),
          ce("div", { style:{ marginTop:"10px", fontSize:"0.82rem", color:"var(--text-dim)" } }, selDino.emoji + " " + selDino.name)
        ),

        // Color pickers
        ce("div", { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px", marginBottom:"20px" } },
          colorFields.map(function(cf) {
            return ce("div", { key:cf.key, style:{ background:"rgba(255,255,255,0.04)", borderRadius:"12px", padding:"12px", border:"1px solid var(--border)" } },
              ce("div", { style:{ fontSize:"0.7rem", color:"var(--text-dim)", letterSpacing:"1px", textTransform:"uppercase", marginBottom:"4px", fontFamily:"var(--font-display)" } }, cf.label),
              ce("div", { style:{ fontSize:"0.68rem", color:"var(--text-muted)", marginBottom:"8px" } }, cf.desc),
              ce("div", { style:{ display:"flex", alignItems:"center", gap:"10px" } },
                ce("input", { type:"color", value:colors[cf.key], onChange:function(ev) { updateColor(cf.key, ev.target.value); }, style:{ width:"40px", height:"40px", borderRadius:"8px", padding:0 } }),
                ce("span", { style:{ fontSize:"0.78rem", color:"var(--text-dim)", fontFamily:"monospace" } }, colors[cf.key])
              )
            );
          })
        ),

        // Presets
        ce("div", { style:{ marginBottom:"20px" } },
          ce("div", { style:{ fontSize:"0.7rem", color:"var(--text-dim)", letterSpacing:"1.5px", textTransform:"uppercase", marginBottom:"8px", fontFamily:"var(--font-display)" } }, "Presets"),
          ce("div", { style:{ display:"flex", flexWrap:"wrap", gap:"6px" } },
            presets.map(function(p) {
              return ce("button", {
                key:p.name,
                onClick:function() { setColors(p.colors); },
                style:{ padding:"6px 12px", borderRadius:"20px", border:"1px solid var(--border)", background:"rgba(255,255,255,0.05)", color:"var(--text)", fontSize:"0.78rem", cursor:"pointer", fontFamily:"var(--font-body)", transition:"all 0.2s" },
                onMouseEnter:function(ev) { ev.target.style.borderColor="var(--accent)"; ev.target.style.background="rgba(232,122,30,0.1)"; },
                onMouseLeave:function(ev) { ev.target.style.borderColor="var(--border)"; ev.target.style.background="rgba(255,255,255,0.05)"; }
              }, p.name);
            }),
            ce("button", {
              onClick:randomize,
              style:{ padding:"6px 12px", borderRadius:"20px", border:"1px solid rgba(232,122,30,0.3)", background:"rgba(232,122,30,0.1)", color:"var(--accent)", fontSize:"0.78rem", cursor:"pointer", fontFamily:"var(--font-body)", fontWeight:"bold" }
            }, "🎲 Zufall")
          )
        ),

        // Name + save
        ce("div", { style:{ display:"flex", gap:"8px", marginBottom:"16px" } },
          ce("input", { type:"text", value:skinName, onChange:function(ev) { setSkinName(ev.target.value); }, placeholder:"Skin-Name (optional)", style:{ flex:1, padding:"12px 14px", borderRadius:"12px", border:"1px solid var(--border)", background:"rgba(255,255,255,0.06)", color:"var(--text)", fontSize:"0.88rem", outline:"none", fontFamily:"var(--font-body)" } }),
          ce("button", {
            onClick:handleSave,
            style:{ padding:"12px 20px", borderRadius:"12px", border:"none", cursor:"pointer", background:"linear-gradient(135deg, var(--accent), #f5a623)", color:"#fff", fontSize:"0.88rem", fontWeight:"bold", fontFamily:"var(--font-body)", boxShadow:"0 4px 18px var(--accent-glow)", whiteSpace:"nowrap" }
          }, "💾 Speichern")
        ),

        // Saved skins
        saved.length > 0 ? ce("div", null,
          ce("div", { style:{ fontSize:"0.7rem", color:"var(--text-dim)", letterSpacing:"1.5px", textTransform:"uppercase", marginBottom:"8px", fontFamily:"var(--font-display)" } }, "Gespeicherte Skins"),
          ce("div", { style:{ display:"flex", flexDirection:"column", gap:"8px" } },
            saved.map(function(s) {
              return ce("div", { key:s.id, onClick:function() { loadSkin(s); }, style:{ background:"rgba(255,255,255,0.04)", border:"1px solid var(--border)", borderRadius:"12px", padding:"10px 14px", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"space-between", transition:"border-color 0.2s" },
                onMouseEnter:function(ev) { ev.currentTarget.style.borderColor="var(--accent)"; },
                onMouseLeave:function(ev) { ev.currentTarget.style.borderColor="var(--border)"; }
              },
                ce("div", null,
                  ce("div", { style:{ color:"#fff", fontWeight:"bold", fontSize:"0.88rem" } }, s.emoji + " " + s.name),
                  ce("div", { style:{ color:"var(--text-muted)", fontSize:"0.72rem" } }, s.dino)
                ),
                ce("div", { style:{ display:"flex", gap:"4px" } },
                  [s.colors.primary, s.colors.secondary, s.colors.belly, s.colors.markings].map(function(c, i) {
                    return ce("div", { key:i, style:{ width:"18px", height:"18px", borderRadius:"4px", background:c, border:"1px solid rgba(255,255,255,0.15)" } });
                  })
                )
              );
            })
          )
        ) : null,

        // Toast
        toast ? ce("div", { style:{ position:"fixed", bottom:"24px", left:"50%", transform:"translateX(-50%)", background: toast.type==="success" ? "rgba(46,196,134,0.95)" : "rgba(232,122,30,0.95)", color:"#fff", padding:"10px 22px", borderRadius:"50px", fontSize:"0.85rem", fontWeight:"bold", boxShadow:"0 8px 30px rgba(0,0,0,0.5)", animation:"toastIn 0.3s ease", zIndex:1000 } }, toast.msg) : null
      );
    }

    /* =========================================
       DINO TRACKER COMPONENT
    ========================================= */
    function formatTime(secs) {
      var h = Math.floor(secs / 3600);
      var m = Math.floor((secs % 3600) / 60);
      var s = secs % 60;
      return String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
    }

    var initialEntries = [
      { species:"Triceratops", emoji:"🦏", percent:12.5, time:"00:04:33", id:1 },
      { species:"Tyrannosaurus", emoji:"🦖", percent:8.2, time:"00:02:10", id:2 },
      { species:"Pteranodon", emoji:"🦅", percent:20.0, time:"00:07:55", id:3 },
    ];

    function DinoTracker() {
      var _sel = useState(null), selectedDino = _sel[0], setSelectedDino = _sel[1];
      var _gp = useState(""), growthPercent = _gp[0], setGrowthPercent = _gp[1];
      var _el = useState(0), elapsed = _el[0], setElapsed = _el[1];
      var _ru = useState(false), running = _ru[0], setRunning = _ru[1];
      var _pa = useState(false), paused = _pa[0], setPaused = _pa[1];
      var _en = useState(initialEntries), entries = _en[0], setEntries = _en[1];
      var _to = useState(null), toast = _to[0], setToast = _to[1];
      var _dd = useState(false), dropdownOpen = _dd[0], setDropdownOpen = _dd[1];
      var _at = useState("tracker"), subTab = _at[0], setSubTab = _at[1];

      useEffect(function() {

        } else { clearInterval(intervalRef.current); }

      }, [running]);

      function handleStart() { if (!running&&!paused) { pausedElapsedRef.current=0; setElapsed(0); setRunning(true); setPaused(false); } }
      function handlePause() { if (running) { pausedElapsedRef.current=elapsed; setRunning(false); setPaused(true); } }
      function handleResume() { if (paused) { setRunning(true); setPaused(false); } }
      function handleStop() { setRunning(false); setPaused(false); pausedElapsedRef.current=0; setElapsed(0); }
      function showToast(msg, type) { setToast({msg:msg,type:type}); setTimeout(function(){setToast(null);},3000); }

        setGrowthPercent("");

          })

          ce("div", { style:{ marginBottom:"18px", position:"relative" } },
            ce("label", { style:{ display:"block", color:"var(--text-dim)", fontSize:"0.72rem", marginBottom:"6px", letterSpacing:"1.5px", textTransform:"uppercase", fontFamily:"var(--font-display)" } }, "Spezies"),
            ce("button", { onClick:function(){setDropdownOpen(!dropdownOpen);}, style:{ width:"100%", padding:"12px 16px", borderRadius:"12px", border:"1px solid var(--border)", background:"rgba(255,255,255,0.06)", color:"var(--text)", fontSize:"0.92rem", cursor:"pointer", textAlign:"left", display:"flex", alignItems:"center", justifyContent:"space-between", fontFamily:"var(--font-body)" } },
              ce("span",null, selectedDino ? selectedDino.emoji+" "+selectedDino.name : "— Dinosaurier wählen —"),
              ce("span",{style:{opacity:0.4}}, dropdownOpen?"▲":"▼")
            ),
            dropdownOpen ? ce("div", { style:{ position:"absolute", top:"100%", left:0, right:0, background:"#121e2a", border:"1px solid var(--border)", borderRadius:"12px", zIndex:100, maxHeight:"200px", overflowY:"auto", marginTop:"4px", boxShadow:"0 12px 40px rgba(0,0,0,0.5)" } },
              DINOS.map(function(d) {
                return ce("div", { key:d.name, onClick:function(){setSelectedDino(d);setDropdownOpen(false);}, onMouseEnter:function(ev){ev.target.style.background="rgba(255,255,255,0.07)";}, onMouseLeave:function(ev){ev.target.style.background=selectedDino&&selectedDino.name===d.name?"rgba(232,122,30,0.15)":"transparent";}, style:{ padding:"9px 16px", cursor:"pointer", color:"#fff", fontSize:"0.85rem", background:selectedDino&&selectedDino.name===d.name?"rgba(232,122,30,0.15)":"transparent", transition:"background 0.15s" } }, d.emoji+" "+d.name);
              })
            ) : null

          // Growth input
          ce("div", { style:{ marginBottom:"22px" } },
            ce("label", { style:{ display:"block", color:"var(--text-dim)", fontSize:"0.72rem", marginBottom:"6px", letterSpacing:"1.5px", textTransform:"uppercase", fontFamily:"var(--font-display)" } }, "Wachstumsrate (%)"),

          ),
          // Timer
          ce("div", { style:{ textAlign:"center", marginBottom:"18px", background:"rgba(0,0,0,0.3)", borderRadius:"16px", padding:"20px", border:"1px solid rgba(232,122,30,0.15)" } },
            ce("div", { style:{ color:"var(--text-muted)", fontSize:"0.68rem", letterSpacing:"2px", marginBottom:"6px", fontFamily:"var(--font-display)" } }, "TIMER"),
            ce("div", { style:{ fontSize:"2.6rem", fontWeight:"bold", letterSpacing:"4px", color: running?"var(--accent)":paused?"#f5a623":"rgba(255,255,255,0.6)", fontFamily:"'Courier New',monospace", textShadow: running?"0 0 20px var(--accent-glow)":"none", transition:"color 0.3s" } }, formatTime(elapsed)),
            ce("div", { style:{ fontSize:"0.68rem", marginTop:"6px", color: running?"var(--accent2)":paused?"#f5a623":"var(--text-muted)" } }, running?"● LÄUFT":paused?"⏸ PAUSIERT":"○ GESTOPPT")
          ),
          // Timer buttons
          ce("div", { style:{ display:"flex", gap:"8px", marginBottom:"14px" } },
            [{label:"▶ Start",fn:handleStart,active:!running&&!paused,color:"#22c55e"},{label:"⏸ Pause",fn:handlePause,active:running,color:"#f59e0b"},{label:"⏵ Weiter",fn:handleResume,active:paused,color:"#3b82f6"},{label:"⏹ Stop",fn:handleStop,active:running||paused,color:"#ef4444"}].map(function(b) {
              return ce("button",{key:b.label,onClick:b.fn,style:{flex:1,padding:"10px 0",borderRadius:"10px",border:"none",cursor:b.active?"pointer":"default",background:b.active?b.color:"rgba(255,255,255,0.05)",color:b.active?"#fff":"var(--text-muted)",fontSize:"0.7rem",fontWeight:"bold",fontFamily:"var(--font-body)",transition:"all 0.2s",opacity:b.active?1:0.5}},b.label);
            })
          ),
          // Save
          ce("button",{onClick:handleSave,style:{width:"100%",padding:"13px",borderRadius:"14px",border:"none",cursor:"pointer",background:"linear-gradient(135deg, var(--accent), #f5a623)",color:"#fff",fontSize:"0.95rem",fontWeight:"bold",fontFamily:"var(--font-body)",boxShadow:"0 4px 20px var(--accent-glow)",transition:"transform 0.15s"},onMouseEnter:function(ev){ev.target.style.transform="translateY(-2px)";},onMouseLeave:function(ev){ev.target.style.transform="none";}},"💾 Eintrag speichern")
        ) : ce(F, null,
          // Records
          topGrower ? ce("div",{style:{background:"rgba(232,122,30,0.1)",border:"1px solid rgba(232,122,30,0.2)",borderRadius:"12px",padding:"12px 16px",marginBottom:"14px",display:"flex",alignItems:"center",gap:"10px"}},

            ce("h2", { style:{ fontFamily:"var(--font-display)", fontSize:"1.3rem", color:"var(--text)", marginBottom:"10px", fontWeight:700 } }, "Willkommen!"),

          ),
          // Tool cards
          ce("div", { style:{ display:"flex", flexDirection:"column", gap:"14px", animation:"fadeUp 0.5s ease 0.15s both" } },
            // Skin Creator card
            ce("div", {
